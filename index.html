<!DOCTYPE html>
<html>
    <head>
        <title>Github pages</title>
        <style>
            body{
                background-color: salmon;
            }
            #header{
                color: green;
                font-style: bold;
            }
            
        </style>
    </head>
    <body>
        <h1 id="header">Web Programming with Python and Javascript</h1>
        <form method="POST">
            <div>
                <input type='text'>
            </div>
           <div>
            <button id='submit' type='button'>Send</button>
           </div>
        </form>
        <script>
            const button = document.getElementById('submit');
            button.click = function(event){
                console.log("Submit button was clicked");
                console.log(event);
            }
        </script>     
    </body>
</html>
